name: Sync official match results

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3,9,13 * * *"

permissions:
  contents: write

concurrency:
  group: cfd-official-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run sync
        id: sync
        continue-on-error: true
        run: npm run sync

      - name: Show sync state
        if: always()
        run: |
          echo "===== sync-state.json ====="
          cat data/sync-state.json || true
          echo "==========================="

      - name: Commit result
        if: always()
        run: |
          git config user.name "cfd-result-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.js details.js data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "自動更新: 公式試合結果を反映"
            git push
          fi

      - name: Fail when sync failed
        if: steps.sync.outcome == 'failure'
        run: exit 1
